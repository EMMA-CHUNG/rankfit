name: CI / Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]   # triggers PyPI upload on GitHub Release

jobs:
  # ── 1. Run tests on every push / PR ───────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint with ruff
        run: ruff check rankfit/

      - name: Check formatting with black
        run: black --check rankfit/ tests/

      - name: Run tests
        run: pytest --cov=rankfit --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── 2. Build & publish to PyPI on GitHub Release ──────────────────────────
  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: pypi          # requires a "pypi" environment in repo settings

    permissions:
      id-token: write          # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
